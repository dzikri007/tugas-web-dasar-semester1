<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Member - Perpustakaan Digital</title>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f5f8ff',
                            100: '#ebf2fe',
                            200: '#dce6fd',
                            300: '#c5d5fc',
                            400: '#a3befa',
                            500: '#7a9df7',
                            600: '#5376f2',
                            700: '#3853e0',
                            800: '#2e41b9',
                            900: '#2a3b93',
                            950: '#1b2357',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-slate-100 to-indigo-50/30 min-h-screen text-slate-800 flex flex-col">

    <!-- Header / Navbar -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200/80">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="flex items-center space-x-3 group">
                        <img src="img/Kabupaten-Tasikmalaya.png" alt="Logo Kabupaten Tasikmalaya" class="h-14 w-auto drop-shadow-sm transition-transform duration-300 group-hover:scale-105">
                        <div class="flex flex-col">
                            <span class="text-lg font-bold text-slate-800 tracking-tight leading-tight group-hover:text-indigo-600 transition-colors">Perpustakaan Digital</span>
                            <span class="text-xs font-semibold text-slate-500 tracking-wide uppercase">Desa Kalimanggis</span>
                        </div>
                    </a>
                </div>
                
                <!-- Desktop Nav Links -->
                <div class="hidden md:flex items-center space-x-1">
                    <a href="index.html" class="px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 text-slate-600 hover:text-indigo-600 hover:bg-slate-50">Beranda</a>
                    <a href="Transaksi.html" class="px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 text-slate-600 hover:text-indigo-600 hover:bg-slate-50">Transaksi</a>
                    <a href="buku.html" class="px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 text-slate-600 hover:text-indigo-600 hover:bg-slate-50">Buku</a>
                    <a href="profile.html" class="px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 text-slate-600 hover:text-indigo-600 hover:bg-slate-50">Profile</a>
                    <a href="Login.html" class="ml-4 px-5 py-2.5 bg-indigo-800 text-white rounded-xl text-sm font-semibold shadow-md shadow-indigo-200 hover:-translate-y-0.5 transition-all duration-200">Login</a>
                </div>

                <!-- Mobile menu button -->
                <div class="flex items-center md:hidden">
                    <button id="mobile-menu-button" type="button" class="inline-flex items-center justify-center p-2 rounded-xl text-slate-500 hover:text-slate-700 hover:bg-slate-100/80 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500 transition-all duration-200" aria-controls="mobile-menu" aria-expanded="false">
                        <span class="sr-only">Open main menu</span>
                        <svg class="h-6 w-6 block" id="menu-icon-open" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                        </svg>
                        <svg class="h-6 w-6 hidden" id="menu-icon-close" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div class="hidden md:hidden bg-white border-b border-slate-200 animate-fadeIn" id="mobile-menu">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="index.html" class="block px-4 py-2.5 rounded-xl text-base font-medium text-slate-600 hover:text-indigo-600 hover:bg-slate-50">Beranda</a>
                <a href="Transaksi.html" class="block px-4 py-2.5 rounded-xl text-base font-medium text-slate-600 hover:text-indigo-600 hover:bg-slate-50">Transaksi</a>
                <a href="buku.html" class="block px-4 py-2.5 rounded-xl text-base font-medium text-slate-600 hover:text-indigo-600 hover:bg-slate-50">Buku</a>
                <a href="profile.html" class="block px-4 py-2.5 rounded-xl text-base font-medium text-slate-600 hover:text-indigo-600 hover:bg-slate-50">Profile</a>
                <a href="Login.html" class="block px-4 py-2.5 rounded-xl text-base font-semibold text-indigo-600 bg-indigo-50/80">Login</a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-20 flex justify-center items-center">
        
        <!-- Login Card -->
        <div class="bg-white/80 backdrop-blur-xl border border-white/40 shadow-2xl rounded-3xl p-8 sm:p-10 max-w-md w-full relative">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-indigo-400/20 rounded-full blur-2xl -z-10"></div>
            <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-purple-400/20 rounded-full blur-2xl -z-10"></div>
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto text-2xl font-bold shadow-md shadow-indigo-50 mb-4">
                    🔑
                </div>
                <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Login Member</h2>
                <p class="text-sm font-semibold text-slate-500 mt-1">Masukkan data diri Anda untuk mencatat kehadiran</p>
            </div>

            <form id="formTransaksi" class="space-y-6">
                <!-- Nama Member -->
                <div>
                    <label for="nama" class="block text-sm font-bold text-slate-700 mb-2">Nama Member:</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none text-base">👤</span>
                        <input type="text" id="nama" name="nama" required 
                            placeholder="Masukkan nama lengkap Anda"
                            class="block w-full pl-10 pr-4 py-3 bg-white/70 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 rounded-xl text-slate-800 placeholder-slate-400 font-medium transition-all duration-200 outline-none">
                    </div>
                </div>

                <!-- Kelas -->
                <div>
                    <label for="jumlah" class="block text-sm font-bold text-slate-700 mb-2">Kelas:</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none text-base">🏫</span>
                        <input type="number" id="jumlah" name="jumlah" required min="1" max="12"
                            placeholder="Masukkan tingkat kelas (1-12)"
                            class="block w-full pl-10 pr-4 py-3 bg-white/70 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 rounded-xl text-slate-800 placeholder-slate-400 font-medium transition-all duration-200 outline-none">
                    </div>
                </div>

                <!-- Kategori -->
                <div>
                    <label for="kategori" class="block text-sm font-bold text-slate-700 mb-2">Kehadiran:</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none text-base">📌</span>
                        <select id="kategori" name="kategori" required
                            class="block w-full pl-10 pr-10 py-3 bg-white/70 border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 rounded-xl text-slate-800 font-medium appearance-none transition-all duration-200 outline-none cursor-pointer">
                            <option value="simpan">Absen (Izin/Sakit)</option>
                            <option value="pinjam" selected>Hadir</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none text-slate-400">
                            ▼
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full py-4 bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white rounded-xl text-base font-bold shadow-lg shadow-indigo-100 hover:shadow-xl hover:shadow-indigo-200 hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center space-x-2 cursor-pointer">
                    <span>Submit Kehadiran</span>
                </button>
            </form>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-8 border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center space-y-2">
            <p class="text-sm font-semibold text-slate-300">Perpustakaan Digital Desa Kalimanggis</p>
            <p class="text-xs text-slate-500">Owii &copy; 2024 - Kabupaten Tasikmalaya. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- JavaScript for Mobile Menu toggle -->
    <script>
        const menuBtn = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        const iconOpen = document.getElementById('menu-icon-open');
        const iconClose = document.getElementById('menu-icon-close');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            iconOpen.classList.toggle('hidden');
            iconClose.classList.toggle('hidden');
        });
    </script>
</body>
</html>
